exclude: "(?x)(\n    doc/source/conf.py\n)\n"
repos:

- repo: https://github.com/psf/black
  rev: 87928e6d6761a4a6d22250e1fee5601b3998086e  # frozen: 26.5.1
  hooks:
    - id: black
      args:
        - --line-length=200

- repo: https://github.com/adamchainz/blacken-docs
  rev: fda77690955e9b63c6687d8806bafd56a526e45f  # frozen: 1.20.0
  hooks:
    - id: blacken-docs
      additional_dependencies: [black==26.5.1]

- repo: https://github.com/pycqa/isort
  rev: a333737ed43df02b18e6c95477ea1b285b3de15a  # frozen: 8.0.1
  hooks:
    - id: isort
      name: isort (python)
      args: ['--filter-files', '--profile', 'black']

- repo: https://github.com/PyCQA/flake8
  rev: c48217e1fc006c2dddd14df54e83b67da15de5cd  # frozen: 7.3.0
  hooks:
    - id: flake8
      args:
        - --max-line-length=200

- repo: https://github.com/codespell-project/codespell
  rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
  hooks:
    - id: codespell
      args: ["--ignore-words", "doc/styles/config/vocabularies/ANSYS/accept.txt", "-w"]
      exclude: "(?x)^(\n    .*\\.css\n)$"
      additional_dependencies:
        - tomli

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
    - id: debug-statements
    - id: trailing-whitespace

- repo: https://github.com/ansys/pre-commit-hooks
  rev: ad4e7598809ad98cde5aaf52d80040c7ac56e7cf  # frozen: v0.7.2
  hooks:
  - id: add-license-headers
    args:
    - --start_year=2024
