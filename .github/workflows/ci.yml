name: Github CI-CD

on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - "*"
    branches:
      - "main"
  schedule: # UTC at 0300
    - cron: "0 3 * * *"

env:
  ANSYSLMD_LICENSE_FILE: ${{ format('1055@{0}', secrets.LICENSE_SERVER) }}
  DOCUMENTATION_CNAME: 'examples.aedt.docs.pyansys.com'
  MAIN_PYTHON_VERSION: '3.13'
  ON_CI: True
  PYAEDT_NON_GRAPHICAL: '1'
  # To keep as it impacts pyaedt behavior
  PYAEDT_DOC_GENERATION: '1'
  PYAEDT_LOCAL_SETTINGS_PATH: 'doc/pyaedt_settings.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {} # Disable default permissions

jobs:

  lock-file:
    name: "Update requirements lock file"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push the branch with the updated lock file
      pull-requests: write  # Needed to push the updated lock file in a PR context
    env:
      BASE_REF: ${{ github.event.pull_request.base.ref }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true # Needed to push the updated lock file
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if requirements files changed
        id: changes
        run: |
          if git diff --name-only "origin/${BASE_REF}...HEAD" -- requirements/ | grep -q .; then
            echo "dependency_changes=true" >> $GITHUB_OUTPUT
          else
            echo "dependency_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Install uv
        if: steps.changes.outputs.dependency_changes == 'true'
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
          prune-cache: true

      - name: Compile lock file
        if: steps.changes.outputs.dependency_changes == 'true'
        run: uv pip compile requirements/requirements_doc.txt -o requirements/requirements_doc.lock --python-version 3.13

      - name: Commit updated lock file
        if: steps.changes.outputs.dependency_changes == 'true'
        env:
          PYANSYS_CI_BOT_USERNAME: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          PYANSYS_CI_BOT_EMAIL: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
        run: |
          git config --global user.name "${PYANSYS_CI_BOT_USERNAME}"
          git config --global user.email "${PYANSYS_CI_BOT_EMAIL}"

          git add requirements/requirements_doc_uv.lock
          git diff --cached --quiet || git commit -m "CHORE: Update requirements lock file"
          git push

  actions-security:
    name: "Check actions security"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ansys/actions/check-actions-security@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          generate-summary: true
          token: ${{ secrets.GITHUB_TOKEN }}
          auditing-level: 'high'
          
  doc-style:
    name: Documentation style
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ansys/actions/doc-style@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}



# =================================================================================================
# vvvvvvvvvvvvvvvvvvvvvvvvvvvvvv    RUNNING ON SELF-HOSTED RUNNER    vvvvvvvvvvvvvvvvvvvvvvvvvvvvvv
# =================================================================================================

  doc-build:
    name: Build documentation
    runs-on: [self-hosted, Windows, pyaedt-examples]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up headless display
        uses: pyvista/setup-headless-display-action@5bc8de3bc71fcda7a96439571287a554901541a0 # v4.3

      - name: Get new/modified examples files (only for PRs)
        if: github.ref_name != 'main'
        shell: powershell
        run: |
          $changed = git diff --name-only origin/main...HEAD -- examples/
          $changed = $changed | ForEach-Object { $_.Replace('\', '/') }

          Write-Output "New/Modified files:"
          $changed | ForEach-Object { Write-Output "- $_" }

          $changed_formatted = $changed -join ","
          Add-Content -Path $env:GITHUB_ENV -Value "ON_CI_CHANGED_EXAMPLES=$changed_formatted"

      - name: Set up Python ${{ env.MAIN_PYTHON_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
          prune-cache: true

      - name: Enable long paths in Windows
        shell: powershell
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force

      - name: Install project and documentation dependencies
        run: |
          uv venv
          uv pip install -r requirements/requirements_doc_uv.lock

      # Use environment variable speed up build for PDF pages
      - name: Create HTML documentation
        env:
          SPHINXBUILD_HTML_AND_PDF_WORKFLOW: "1"
          ON_CI_CHANGED_EXAMPLES: ${{ env.ON_CI_CHANGED_EXAMPLES }}
        run: |
          .venv\Scripts\Activate.ps1
          . .\doc\make.bat html --color -T -W
          if ($LASTEXITCODE -ne 0) {
            Write-Output "HTML build failed, see the logs and look for:"
            Write-Output "- an exception being raised in a Juptyer notebook;"
            Write-Output "- the latest line of the form reading sources... [ XX%] examples/..."
            echo "::error::HTML build failed, check for exceptions in Jupyter notebooks or incomplete source reads."
            exit 1
          } else {
            Write-Output "HTML build successful"
          }

      - name: Upload HTML documentation artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: documentation-html
          path: doc/_build/html
          retention-days: 7

      # Use environment variable to remove the doctree after the build of PDF pages
      # Keeping doctree could cause an issue, see https://github.com/ansys/pyaedt/pull/3844/files
      - name: Create PDF documentation
        env:
          SPHINXBUILD_HTML_AND_PDF_WORKFLOW: "1"
          ON_CI_CHANGED_EXAMPLES: ${{ env.ON_CI_CHANGED_EXAMPLES }}
        run: |
          .venv\Scripts\Activate.ps1
          . .\doc\make.bat pdf

      - name: Upload PDF documentation artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: documentation-pdf
          path: doc/_build/latex
          retention-days: 7

  deploy-doc:
    name: Upload documentation
    if: contains(github.ref, 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: [doc-build]
    permissions:
      contents: write # Needed to update files on the gh-pages branch
    steps:
      - name: Deploy the documentation
        uses: ansys/actions/doc-deploy-dev@d946b24b9a765f4169bcc94afdb27bd1a0533741 # v10.3.2
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}
          doc-artifact-name: 'documentation-html'
