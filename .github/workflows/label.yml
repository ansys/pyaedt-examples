name: Labeler
on:
  pull_request:
  push:
    branches: [ main ]
    paths:
      - '../labels.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {} # Disable default permissions

jobs:

  label-syncer:
    name: Syncer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: micnncim/action-label-syncer@3abd5ab72fda571e69fffd97bd4e0033dd5f495c # v1.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  labeler:
    name: Set labels
    needs: [label-syncer]
    permissions:
      contents: read        # Required to read repository files and .github/labeler.yml configuration
      pull-requests: write  # Required to add/modify labels on pull requests
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    runs-on: ubuntu-latest
    steps:

    # Label based on modified files
    - name: Label based on changed files
      uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        sync-labels: true

    # Label based on branch name
    - name: Label docs
      if: startsWith(github.event.pull_request.head.ref, 'docs')
      run: gh pr edit "$PR_NUMBER" --add-label "documentation" --repo ansys/pyaedt-examples

    - name: Label maintenance
      if: |
        startsWith(github.event.pull_request.head.ref, 'maint') ||
        startsWith(github.event.pull_request.head.ref, 'ci')
      run: gh pr edit "$PR_NUMBER" --add-label "maintenance" --repo ansys/pyaedt-examples

    - name: Label enhancement
      if: startsWith(github.event.pull_request.head.ref, 'feat')
      run: gh pr edit "$PR_NUMBER" --add-label "enhancement" --repo ansys/pyaedt-examples

    - name: Label bug
      if: startsWith(github.event.pull_request.head.ref, 'fix')
      run: gh pr edit "$PR_NUMBER" --add-label "bug" --repo ansys/pyaedt-examples

  commenter:
    name: Suggest labels if none assigned
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # Needed to create deployment comments on PRs
    steps:
    - name: Suggest to add labels
      uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
      # Execute only when no labels have been applied to the pull request
      if: toJSON(github.event.pull_request.labels.*.name) == '{}'
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          Please add one of the following labels to add this contribution to the Release Notes :point_down:
          - [bug](https://github.com/ansys/pyaedt-examples/pulls?q=label%3Abug+)
          - [documentation](https://github.com/ansys/pyaedt-examples/pulls?q=label%3Adocumentation+)
          - [enhancement](https://github.com/ansys/pyaedt-examples/pulls?q=label%3Aenhancement+)
          - [good first issue](https://github.com/ansys/pyaedt-examples/pulls?q=label%3Agood+first+issue)
          - [maintenance](https://github.com/ansys/pyaedt-examples/pulls?q=label%3Amaintenance+)
          - [release](https://github.com/ansys/pyaedt-examples/pulls?q=label%3Arelease+)
